name: Generate profile assets

# Self-hosted profile assets — renders SVGs in CI and commits them to the repo.
# No third-party render service at view time (no Vercel/Demolab => no 429).

on:
  schedule:
    - cron: "17 4 * * *"   # daily, 04:17 UTC
  workflow_dispatch:        # run on demand from the Actions tab
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/profile.yml"

permissions:
  contents: write

concurrency:
  group: profile-assets
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render low-poly SVGs (own generator, stdlib only)
        env:
          # PROFILE_TOKEN: PAT classic with `repo, read:user` for private stats.
          # Falls back to the default GITHUB_TOKEN (public data only) if unset.
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
          GH_LOGIN: ${{ github.repository_owner }}
        run: python scripts/gen_profile.py

      - name: Commit generated assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh profile assets [skip ci]"
            git push
          fi

  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      - name: Publish snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
