<svg width="1200" height="130" viewBox="0 0 1200 130" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="automate everything. secure it all.">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6bd6"/>
      <stop offset="30%" stop-color="#ff2e97"/>
      <stop offset="60%" stop-color="#bf00ff"/>
      <stop offset="85%" stop-color="#3a0ca3"/>
      <stop offset="100%" stop-color="#1a0b2e"/>
    </linearGradient>
    <clipPath id="fclip"><rect width="1200" height="130"/></clipPath>
  </defs>
  <g clip-path="url(#fclip)">
    <rect width="1200" height="130" fill="#1a0b2e"/>
    <!-- waving band -->
    <path fill="url(#fbg)" opacity="0.95"
      d="M0,40 C200,10 400,70 600,40 C800,10 1000,70 1200,40 L1200,130 L0,130 Z">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="
          M0,40 C200,10 400,70 600,40 C800,10 1000,70 1200,40 L1200,130 L0,130 Z;
          M0,40 C200,70 400,10 600,40 C800,70 1000,10 1200,40 L1200,130 L0,130 Z;
          M0,40 C200,10 400,70 600,40 C800,10 1000,70 1200,40 L1200,130 L0,130 Z"/>
    </path>
    <!-- twinkling stars -->
    <g fill="#ffffff">
      <circle cx="150" cy="20" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="500" cy="14" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/></circle>
      <circle cx="900" cy="22" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
      <circle cx="1080" cy="12" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
    </g>
    <text x="600" y="100" text-anchor="middle" font-family="monospace" font-size="18"
          letter-spacing="1" font-weight="700" fill="#00ffff">automate everything. secure it all.</text>
  </g>
</svg>
