<svg width="720" height="96" viewBox="0 0 720 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Backend Engineer dialogue box"><defs><linearGradient id="title" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ff6bd6"/><stop offset="100%" stop-color="#00ffff"/></linearGradient><linearGradient id="frame" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6bd6"/><stop offset="50%" stop-color="#bf00ff"/><stop offset="100%" stop-color="#00ffff"/></linearGradient><linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#241046"/><stop offset="100%" stop-color="#1a0b2e"/></linearGradient></defs><rect x="3" y="3" width="714" height="90" rx="6" fill="url(#panel)" stroke="url(#frame)" stroke-width="2"/><rect x="9" y="9" width="702" height="78" rx="4" fill="none" stroke="#bf00ff" stroke-width="1" opacity="0.5"/><text x="22" y="53.0" font-family="'Press Start 2P', monospace" font-size="14" font-weight="400" fill="#ff2e97" text-anchor="start">&#9656;</text><text x="46" y="53.0" font-family="'Press Start 2P', monospace" font-size="13" fill="url(#title)" opacity="0">Backend Engineer -&gt; DevOps / DevSecOps<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0.0000;0.0001;0.0120;0.1547;0.1787;1.0000" dur="17.4s" repeatCount="indefinite"/></text><text x="46" y="53.0" font-family="'Press Start 2P', monospace" font-size="13" fill="url(#title)" opacity="0">If it's not in a pipeline, it doesn't ship.<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0.0000;0.1547;0.1787;0.3213;0.3453;1.0000" dur="17.4s" repeatCount="indefinite"/></text><text x="46" y="53.0" font-family="'Press Start 2P', monospace" font-size="13" fill="url(#title)" opacity="0">Shift-left or go home.<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0.0000;0.3213;0.3453;0.4880;0.5120;1.0000" dur="17.4s" repeatCount="indefinite"/></text><text x="46" y="53.0" font-family="'Press Start 2P', monospace" font-size="13" fill="url(#title)" opacity="0">btw I use Arch.<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0.0000;0.4880;0.5120;0.6547;0.6787;1.0000" dur="17.4s" repeatCount="indefinite"/></text><text x="46" y="53.0" font-family="'Press Start 2P', monospace" font-size="13" fill="url(#title)" opacity="0">Linux is not an OS. It's a religion.<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0.0000;0.6547;0.6787;0.8213;0.8453;1.0000" dur="17.4s" repeatCount="indefinite"/></text><text x="46" y="53.0" font-family="'Press Start 2P', monospace" font-size="13" fill="url(#title)" opacity="0">I don't deploy manually. I'm not an animal.<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0.0000;0.8213;0.8453;0.9880;1.0000;1.0001" dur="17.4s" repeatCount="indefinite"/></text><rect x="694" y="74" width="9" height="9" fill="#00ffff"><animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/></rect></svg>
