<rect width="720" height="90" fill="none"/>
<text x="360.0" y="51.0" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="14" fill="url(#t)" opacity="0">Backend Engineer -&gt; DevOps / DevSecOps<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.0001;0.012;0.1547;0.1787;1" dur="17.4s" repeatCount="indefinite"/></text>
<text x="360.0" y="51.0" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="14" fill="url(#t)" opacity="0">If it&#39;s not in a pipeline, it doesn&#39;t ship.<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.1547;0.1787;0.3213;0.3453;1" dur="17.4s" repeatCount="indefinite"/></text>
<text x="360.0" y="51.0" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="14" fill="url(#t)" opacity="0">Shift-left or go home.<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.3213;0.3453;0.488;0.512;1" dur="17.4s" repeatCount="indefinite"/></text>
<text x="360.0" y="51.0" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="14" fill="url(#t)" opacity="0">btw I use Arch.<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.488;0.512;0.6547;0.6787;1" dur="17.4s" repeatCount="indefinite"/></text>
<text x="360.0" y="51.0" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="14" fill="url(#t)" opacity="0">Linux is not an OS. It&#39;s a religion.<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.6547;0.6787;0.8213;0.8453;1" dur="17.4s" repeatCount="indefinite"/></text>
<text x="360.0" y="51.0" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="14" fill="url(#t)" opacity="0">I don&#39;t deploy manually. I&#39;m not an animal.<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.8213;0.8453;0.988;1;1" dur="17.4s" repeatCount="indefinite"/></text>
