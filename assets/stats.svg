<svg width="460" height="200" viewBox="0 0 460 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub stats">
  <defs>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6bd6"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6bd6"/>
      <stop offset="50%" stop-color="#bf00ff"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241046"/>
      <stop offset="100%" stop-color="#1a0b2e"/>
    </linearGradient>
  </defs>
  <rect x="0.75" y="0.75" width="458.5" height="198.5" rx="10" fill="url(#panel)"
        stroke="url(#frame)" stroke-width="1.5"/>
  <rect x="0" y="0" width="460" height="2.5" fill="#00ffff" opacity="0.08">
    <animate attributeName="y" values="-3;200" dur="5s" repeatCount="indefinite"/>
  </rect>
  <text x="18" y="30" font-family="'Press Start 2P', monospace" font-size="13"
        fill="url(#title)">&#9656; rathosops :: stats</text>
  <line x1="18" y1="40" x2="442" y2="40" stroke="#bf00ff" stroke-width="1" opacity="0.4"/><text x="22" y="64" font-family="monospace" font-size="13" fill="#e0c3fc"><tspan fill="#ff2e97">&#9656;</tspan> commits (this year)</text><text x="438" y="64" text-anchor="end" font-family="monospace" font-size="13" font-weight="700" fill="#00ffff">0</text><text x="22" y="85" font-family="monospace" font-size="13" fill="#e0c3fc"><tspan fill="#ff2e97">&#9656;</tspan> pull requests</text><text x="438" y="85" text-anchor="end" font-family="monospace" font-size="13" font-weight="700" fill="#00ffff">0</text><text x="22" y="106" font-family="monospace" font-size="13" fill="#e0c3fc"><tspan fill="#ff2e97">&#9656;</tspan> issues</text><text x="438" y="106" text-anchor="end" font-family="monospace" font-size="13" font-weight="700" fill="#00ffff">0</text><text x="22" y="127" font-family="monospace" font-size="13" fill="#e0c3fc"><tspan fill="#ff2e97">&#9656;</tspan> stars earned</text><text x="438" y="127" text-anchor="end" font-family="monospace" font-size="13" font-weight="700" fill="#00ffff">0</text><text x="22" y="148" font-family="monospace" font-size="13" fill="#e0c3fc"><tspan fill="#ff2e97">&#9656;</tspan> public repositories</text><text x="438" y="148" text-anchor="end" font-family="monospace" font-size="13" font-weight="700" fill="#00ffff">0</text><text x="22" y="169" font-family="monospace" font-size="13" fill="#e0c3fc"><tspan fill="#ff2e97">&#9656;</tspan> followers</text><text x="438" y="169" text-anchor="end" font-family="monospace" font-size="13" font-weight="700" fill="#00ffff">0</text><text x="230.0" y="192" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff6bd6">0 contributions in the last year</text></svg>
